<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contador</title>
  <script src="./model/funcoes.js" defer></script>
  <script src="./model/manipular.js" defer></script>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <a href="../index.html">← Voltar</a>

    <h1>Contador</h1>
    <p>Informe a quantidade de termos para gerar cada sequência.</p>

    <div class="campo">
      <label>Quantidade</label>
      <input type="number" placeholder="Ex: 5" id="quantidade"/>
    </div>

    <button id="gerarNumeros" onclick="gerarNumeros()">Gerar</button>

    <div class="resultado">
      <p class="resultado-titulo">Resultado</p>
    
      <!-- Cabeçalho fixo -->
      <table id="tabela-header">
        <thead>
          <tr>
            <th>Contagem</th>
            <th>Pares</th>
            <th>Ímpares</th>
            <th>Múlt. de 5</th>
            <th>Potências de 2</th>
          </tr>
        </thead>
      </table>
    
      <div class="tabela-wrapper">
        <table class="tabela-resposta" id="tabela">
          <tbody></tbody>
        </table>
      </div>
    
    </div>

  </div>

</body>
</html>
